name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install SoftHSM2 (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y softhsm2

      - name: Install SoftHSM2 (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install softhsm

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -v -count=1 ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: go vet
        run: go vet ./...
